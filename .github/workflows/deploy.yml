name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. Detectar qué servicios cambiaron
  # ──────────────────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: json
          filters: |
            app-auth:
              - app-auth/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-analysis-service:
              - app-analysis-service/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-frontend:
              - app-frontend/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-report-service:
              - app-report-service/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-review-service:
              - app-review-service/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-surveys-service:
              - app-surveys-service/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-ai-service:
              - app-ai-service/**

  # ──────────────────────────────────────────────────────────
  # 2. Proceso principal Node (lint + test)
  # ──────────────────────────────────────────────────────────
  build-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (clean)
        run: npm ci --no-audit --prefer-offline

      - name: Lint all workspaces
        run: npm run lint

      - name: Run tests
        run: npm run test

  # ──────────────────────────────────────────────────────────
  # 3. Build por workspace (jobs separados, después de build-node)
  # ──────────────────────────────────────────────────────────
  build-workspaces:
    needs: build-node
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - app-auth
          - app-analysis-service
          - app-frontend
          - app-report-service
          - app-review-service
          - app-surveys-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (clean)
        run: npm ci --no-audit --prefer-offline

      - name: Build workspace
        run: npm run build --workspace=${{ matrix.service }}

  # ──────────────────────────────────────────────────────────
  # 4. Lint Python (app-ai-service)
  # ──────────────────────────────────────────────────────────
  lint-python:
    needs: detect-changes
    if: contains(needs.detect-changes.outputs.services, 'app-ai-service')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Lint with ruff
        run: pip install ruff && ruff check src/
