name: CI/CD

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. Detectar qué servicios cambiaron
  # ──────────────────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: json
          filters: |
            app-auth:
              - app-auth/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-analysis-service:
              - app-analysis-service/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-frontend:
              - app-frontend/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-report-service:
              - app-report-service/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-review-service:
              - app-review-service/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-surveys-service:
              - app-surveys-service/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-ai-service:
              - app-ai-service/**

  # ──────────────────────────────────────────────────────────
  # 2. Lint + Test + Build cada servicio Node
  # ──────────────────────────────────────────────────────────
  build-node:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]' && contains(needs.detect-changes.outputs.services, matrix.service)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: app-auth
            project_id_secret: VERCEL_PROJECT_ID_AUTH
          - service: app-analysis-service
            project_id_secret: VERCEL_PROJECT_ID_ANALYSIS
          - service: app-frontend
            project_id_secret: VERCEL_PROJECT_ID_FRONTEND
          - service: app-report-service
            project_id_secret: VERCEL_PROJECT_ID_REPORT
          - service: app-review-service
            project_id_secret: VERCEL_PROJECT_ID_REVIEW
          - service: app-surveys-service
            project_id_secret: VERCEL_PROJECT_ID_SURVEYS
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint --workspace=${{ matrix.service }}

      - name: Test
        run: npm run test -- --project=${{ matrix.service }}

      - name: Build
        run: npm run build --workspace=${{ matrix.service }}

      - name: Pull Vercel project settings
        if: (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main') && github.event_name == 'push'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main') && github.event_name == 'push'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

  # ──────────────────────────────────────────────────────────
  # 3. Lint Python (app-ai-service)
  # ──────────────────────────────────────────────────────────
  lint-python:
    needs: detect-changes
    if: contains(needs.detect-changes.outputs.services, 'app-ai-service')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Lint with ruff
        run: pip install ruff && ruff check src/
