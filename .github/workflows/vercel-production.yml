name: Vercel Production - Main

on:
  push:
    branches:
      - main

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: json
          base: ${{ github.event.before }}
          filters: |
            app-auth:
              - app-auth/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-analysis-service:
              - app-analysis-service/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-review-service:
              - app-review-service/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-report-service:
              - app-report-service/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-surveys-service:
              - app-surveys-service/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts
            app-frontend:
              - app-frontend/**
              - packages/auth/**
              - packages/db/**
              - prisma.config.ts
              - package.json
              - package-lock.json
              - vitest.config.ts

  production:
    name: Deploy to Production
    if: needs.detect-changes.outputs.services != '[]'
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app-auth
            project_id_secret: VERCEL_PROJECT_ID_APP_AUTH
          - name: app-analysis-service
            project_id_secret: VERCEL_PROJECT_ID_ANALYSIS
          - name: app-review-service
            project_id_secret: VERCEL_PROJECT_ID_REVIEW
          - name: app-report-service
            project_id_secret: VERCEL_PROJECT_ID_REPORT
          - name: app-surveys-service
            project_id_secret: VERCEL_PROJECT_ID_SURVEYS
          - name: app-frontend
            project_id_secret: VERCEL_PROJECT_ID_FRONTEND
    steps:
      - name: Checkout repository
        if: contains(needs.detect-changes.outputs.services, matrix.name)
        uses: actions/checkout@v4

      - name: Check project ID secret availability
        id: project-id
        if: contains(needs.detect-changes.outputs.services, matrix.name)
        env:
          PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
        run: |
          if [ -n "$PROJECT_ID" ]; then
            echo "has_project_id=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Missing secret '${{ matrix.project_id_secret }}' for '${{ matrix.name }}'. Skipping deploy to avoid linking root project."
            echo "has_project_id=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: contains(needs.detect-changes.outputs.services, matrix.name) && steps.project-id.outputs.has_project_id == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        if: contains(needs.detect-changes.outputs.services, matrix.name) && steps.project-id.outputs.has_project_id == 'true'
        run: npm i -g vercel@53.3.2

      - name: Pull Vercel production environment
        if: contains(needs.detect-changes.outputs.services, matrix.name) && steps.project-id.outputs.has_project_id == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production

      - name: Build production
        if: contains(needs.detect-changes.outputs.services, matrix.name) && steps.project-id.outputs.has_project_id == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod

      - name: Deploy production
        if: contains(needs.detect-changes.outputs.services, matrix.name) && steps.project-id.outputs.has_project_id == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod
