name: Vercel Production - Main

on:
  push:
    branches:
      - main

jobs:
  production:
    name: Deploy to Production
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app-auth
            working_directory: app-auth
            project_id_secret: VERCEL_PROJECT_ID_APP_AUTH
          - name: app-analysis-service
            working_directory: app-analysis-service
            project_id_secret: VERCEL_PROJECT_ID_ANALYSIS
          - name: app-review-service
            working_directory: app-review-service
            project_id_secret: VERCEL_PROJECT_ID_REVIEW
          - name: app-report-service
            working_directory: app-report-service
            project_id_secret: VERCEL_PROJECT_ID_REPORT
          - name: app-surveys-service
            working_directory: app-surveys-service
            project_id_secret: VERCEL_PROJECT_ID_SURVEYS
          - name: app-frontend
            working_directory: app-frontend
            project_id_secret: VERCEL_PROJECT_ID_FRONTEND

    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
